services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: agrisync_db
      POSTGRES_USER: agrisync_user
      POSTGRES_PASSWORD: agrisync_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

  celery_worker:
    build: ./backend
    command: celery -A celery_worker.celery worker --loglevel=info
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

  celery_beat:
    build: ./backend
    command: celery -A celery_worker.celery beat --loglevel=info
    depends_on:
      - celery_worker
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

  flower:
    build: ./backend
    command: celery -A celery_worker.celery flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - celery_worker
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  postgres_data:
