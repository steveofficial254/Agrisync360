name: AgriSync 360 — CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '18'
  POSTGRES_DB: agrisync_test_db
  POSTGRES_USER: agrisync_user
  POSTGRES_PASSWORD: agrisync_pass
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: BACKEND TESTS
  # ═══════════════════════════════════════════════════════════════

  backend-tests:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-timeout

      - name: ⏳ Wait for PostgreSQL
        run: |
          until PGPASSWORD=${{ env.POSTGRES_PASSWORD }} \
            psql -h localhost -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} -c "SELECT 1" > /dev/null 2>&1; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
        timeout-minutes: 3

      - name: 🔧 Create test database and tables
        env:
          DATABASE_URL: postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@${{ env.POSTGRES_HOST }}:${{ env.POSTGRES_PORT }}/${{ env.POSTGRES_DB }}
        working-directory: backend
        run: |
          flask db upgrade

      - name: ✅ Run backend tests
        working-directory: backend
        env:
          FLASK_ENV: testing
          DATABASE_URL: postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@${{ env.POSTGRES_HOST }}:${{ env.POSTGRES_PORT }}/${{ env.POSTGRES_DB }}
          REDIS_URL: redis://localhost:6379/1
          TESTING: "true"
          AT_API_KEY: test_key
          AT_USERNAME: sandbox
          MPESA_CONSUMER_KEY: test_key
          MPESA_CONSUMER_SECRET: test_secret
          ANTHROPIC_API_KEY: test_key
        run: |
          pytest tests/test_backend.py -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junit-xml=test-results.xml \
            --timeout=30

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
          verbose: true

      - name: 📁 Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: backend-test-results
          path: backend/test-results.xml
          retention-days: 30

      - name: 📁 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/htmlcov/
          retention-days: 30

      - name: 🔴 Fail if coverage is below threshold
        working-directory: backend
        run: |
          COVERAGE=$(grep -oP 'pc_cov">\K[^<]+' htmlcov/index.html | head -1 | sed 's/%//')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: BACKEND LINTING & CODE QUALITY
  # ═══════════════════════════════════════════════════════════════

  backend-lint:
    name: 🔍 Backend Lint & Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint black isort

      - name: 🔍 Run flake8 linter
        working-directory: backend
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 🔍 Check code format with black
        working-directory: backend
        run: |
          black --check app/ 2>/dev/null || echo "⚠️  Code formatting issues found (not fatal)"

      - name: 🔍 Check import order with isort
        working-directory: backend
        run: |
          isort --check-only app/ 2>/dev/null || echo "⚠️  Import order issues found (not fatal)"

      - name: 🔍 Run pylint
        working-directory: backend
        run: |
          pylint app/ --disable=all --enable=E,F --exit-zero || true

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: FRONTEND TESTS
  # ═══════════════════════════════════════════════════════════════

  frontend-tests:
    name: ⚛️  Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: frontend
        run: |
          npm ci
          npm install --save-dev vitest @testing-library/react @testing-library/jest-dom @testing-library/user-event jsdom

      - name: ✅ Run frontend tests
        working-directory: frontend
        run: |
          npm test -- --coverage --watchAll=false --passWithNoTests

      - name: 🔨 Build frontend
        working-directory: frontend
        run: npm run build

      - name: 📁 Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: FRONTEND LINTING
  # ═══════════════════════════════════════════════════════════════

  frontend-lint:
    name: 🔍 Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 Run ESLint
        working-directory: frontend
        run: |
          npm run lint 2>/dev/null || echo "⚠️  Linting issues found (not fatal)"

  # ═══════════════════════════════════════════════════════════════
  # JOB 5: SECURITY CHECKS
  # ═══════════════════════════════════════════════════════════════

  security:
    name: 🔒 Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📤 Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 🔒 Check dependencies with safety
        working-directory: backend
        run: |
          pip install safety
          safety check --json || true

  # ═══════════════════════════════════════════════════════════════
  # JOB 6: DOCKER BUILD
  # ═══════════════════════════════════════════════════════════════

  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 🐳 Build Docker image (backend)
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: agrisync360:${{ github.sha }}
          cache-from: type=registry,ref=agrisync360:latest
          cache-to: type=inline

      - name: 🐳 Build Docker image (frontend)
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: agrisync360-web:${{ github.sha }}
          cache-from: type=registry,ref=agrisync360-web:latest
          cache-to: type=inline

  # ═══════════════════════════════════════════════════════════════
  # JOB 7: DEPENDENCY CHECK
  # ═══════════════════════════════════════════════════════════════

  dependency-check:
    name: 📦 Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check for outdated dependencies (Python)
        working-directory: backend
        run: |
          python -m pip install pip-audit
          pip-audit --skip-editable || true

      - name: 🔍 Check for outdated dependencies (Node)
        working-directory: frontend
        run: |
          npm outdated || true

  # ═══════════════════════════════════════════════════════════════
  # JOB 8: REPORT STATUS
  # ═══════════════════════════════════════════════════════════════

  status-check:
    name: ✅ Status Check
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-lint, frontend-tests, frontend-lint, security, docker-build, dependency-check]
    if: always()

    steps:
      - name: ✅ Check overall status
        run: |
          if [ "${{ needs.backend-tests.result }}" == "failure" ] || \
             [ "${{ needs.frontend-tests.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ]; then
            echo "❌ CI Pipeline failed"
            exit 1
          fi
          echo "✅ CI Pipeline passed"

      - name: 📧 Send Slack notification (success)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ AgriSync 360 CI/CD Pipeline Passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ AgriSync 360 CI/CD Pipeline Passed*\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }

      - name: 📧 Send Slack notification (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ AgriSync 360 CI/CD Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ AgriSync 360 CI/CD Pipeline Failed*\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
