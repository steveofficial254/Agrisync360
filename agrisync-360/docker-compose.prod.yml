services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: agrisync_db
      POSTGRES_USER: agrisync_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build: ./backend
    command: celery -A celery_worker.celery worker --loglevel=info
    depends_on:
      - postgres
      - redis
      - backend
    env_file:
      - ./backend/.env
    restart: unless-stopped

  celery_beat:
    build: ./backend
    command: celery -A celery_worker.celery beat --loglevel=info
    depends_on:
      - celery_worker
    env_file:
      - ./backend/.env
    restart: unless-stopped

  flower:
    build: ./backend
    command: celery -A celery_worker.celery flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - celery_worker
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
